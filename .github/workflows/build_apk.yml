name: Gerar APK Frama
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Atualizado para v4
      
      - name: Setup Java
        uses: actions/setup-java@v4 # Atualizado para v4
        with:
          distribution: 'zulu'
          java-version: '17' # Versão recomendada para builds atuais
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4 # AQUI ESTAVA O ERRO (Agora v4)
        with:
          name: Frama-APK
          path: build/app/outputs/flutter-apk/app-release.apk
